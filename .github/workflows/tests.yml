name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: racing-analyzer/package-lock.json

    - name: Install dependencies
      working-directory: ./racing-analyzer
      run: npm ci

    - name: Run linter (warnings tolerated)
      working-directory: ./racing-analyzer
      run: npm run lint
      continue-on-error: true

    - name: Run tests
      working-directory: ./racing-analyzer
      run: npm test -- --coverage --watchAll=false

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        directory: ./racing-analyzer/coverage
        flags: frontend
        name: frontend-coverage
        fail_ci_if_error: false

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio pytest-mock

    - name: Run tests
      run: |
        pytest --cov=. --cov-report=xml --cov-report=term

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: backend
        name: backend-coverage
        fail_ci_if_error: false

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: racing-analyzer/package-lock.json

    - name: Install dependencies
      working-directory: ./racing-analyzer
      run: npm ci

    - name: Build frontend
      working-directory: ./racing-analyzer
      env:
        # Pin a dummy turnstile site key so the build doesn't bail on
        # the empty-string dev branch in TurnstileWidget. The deploy uses
        # the real one via .env.production.
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ""
      run: npm run build

    - name: Check build output
      run: |
        if [ ! -d "racing-analyzer/.next" ]; then
          echo "Build failed: .next directory not found"
          exit 1
        fi
        echo "Build successful!"
